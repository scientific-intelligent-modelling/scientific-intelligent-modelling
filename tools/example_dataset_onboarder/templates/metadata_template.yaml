dataset:
  name: your_dataset_name
  description: "Describe what the dataset predicts, the source, and any cleaning or split logic."
  splits:
    train:
      file: train.csv
      samples: 0
      notes: "How train split was constructed"
    valid:
      file: valid.csv
      samples: 0
      notes: "How valid split was constructed"
    id_test:
      file: id_test.csv
      samples: 0
      notes: "How ID test split was constructed"
    ood_test:
      file: ood_test.csv
      samples: 0
      notes: "How OOD test split was constructed, or why it is empty"
  features:
    - name: x0
      type: continuous
      description: "Feature description"
      train_range: [0.0, 1.0]
      ood_range: [1.0, 2.0]
  target:
    name: y
    type: continuous
    description: "Target description"
    train_range: [0.0, 1.0]
    ood_range: [1.0, 2.0]
  ground_truth_formula:
    file: formula.py
  license: unknown
  resources:
    - "source path or URL"
